name: YouAreHere
options:
  bundleIdPrefix: com.kimslawson
  deploymentTarget:
    iOS: "16.2"
  createIntermediateGroups: true

# Tell Xcode this project has already been through its "update to recommended
# settings" pass, so it stops flagging the generated project. Bump when a new
# Xcode nags again (format: Xcode 26.3 -> 2630).
attributes:
  LastUpgradeCheck: "2630"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    # Your 10-character Apple Developer Team ID (Xcode > Settings > Accounts).
    # Set here so it survives regeneration and applies to BOTH targets — a team
    # picked in Xcode's Signing pane is wiped on the next `xcodegen generate`.
    DEVELOPMENT_TEAM: "85UNYZPB4U"
    # Xcode's "recommended settings" (the checked items in its upgrade dialog).
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    # Let Xcode inject the standard CFBundle* keys (CFBundleIdentifier, etc.) and
    # MERGE them into our custom Info.plist files (which add the Live Activity,
    # location, and background-mode keys). Without this the built .app has no
    # CFBundleIdentifier and the device refuses it as "not a valid bundle".
    GENERATE_INFOPLIST_FILE: YES

targets:
  YouAreHere:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: YouAreHere
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimslawson.YouAreHere
        INFOPLIST_FILE: YouAreHere/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        # METRICS_LOGGING compiles in the on-device MetricKit performance logger
        # (MetricsLogger.swift) — Debug only, so it's never in a Release/App
        # Store build. See README ▸ Debugging for how to turn it off. DEBUG is
        # listed too because overriding this setting drops Xcode's default.
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG METRICS_LOGGING
    dependencies:
      - target: YouAreHereWidgetExtension

  YouAreHereWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Shared
      - path: YouAreHereWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimslawson.YouAreHere.Widget
        INFOPLIST_FILE: YouAreHereWidget/Info.plist
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"

# An explicit shared scheme that builds the app (which embeds the widget via its
# dependency) and runs the APP — not the widget extension. Without this, Xcode
# auto-creates a scheme per target and selecting the widget's scheme makes Run
# try (and fail) to "show" the extension instead of launching the app.
schemes:
  YouAreHere:
    build:
      targets:
        YouAreHere: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
