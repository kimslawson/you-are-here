name: YouAreHere
options:
  bundleIdPrefix: com.kimslawson
  deploymentTarget:
    iOS: "16.2"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    # Set your Apple Developer team id here (or in Xcode > Signing & Capabilities).
    DEVELOPMENT_TEAM: ""
    # Let Xcode inject the standard CFBundle* keys (CFBundleIdentifier, etc.) and
    # MERGE them into our custom Info.plist files (which add the Live Activity,
    # location, and background-mode keys). Without this the built .app has no
    # CFBundleIdentifier and the device refuses it as "not a valid bundle".
    GENERATE_INFOPLIST_FILE: YES

targets:
  YouAreHere:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: YouAreHere
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimslawson.YouAreHere
        INFOPLIST_FILE: YouAreHere/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: YouAreHereWidgetExtension

  YouAreHereWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Shared
      - path: YouAreHereWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kimslawson.YouAreHere.Widget
        INFOPLIST_FILE: YouAreHereWidget/Info.plist
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"

# An explicit shared scheme that builds the app (which embeds the widget via its
# dependency) and runs the APP — not the widget extension. Without this, Xcode
# auto-creates a scheme per target and selecting the widget's scheme makes Run
# try (and fail) to "show" the extension instead of launching the app.
schemes:
  YouAreHere:
    build:
      targets:
        YouAreHere: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
